<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naming Generator · Factorial Video</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #191919; color: #fff; font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; min-height: 100vh; }
    .wrap { max-width: 520px; margin: 0 auto; padding: 1.5rem 1rem 2rem; position: relative; }
    .wrap-glow { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 0; transition: box-shadow 0.4s ease; border-radius: 1.5rem; }
    .wrap-glow.glow-SEO      { box-shadow: inset 0 0 40px rgba(59,130,246,0.1), inset 0 -20px 40px rgba(59,130,246,0.08); }
    .wrap-glow.glow-SS       { box-shadow: inset 0 0 40px rgba(139,92,246,0.1), inset 0 -20px 40px rgba(139,92,246,0.08); }
    .wrap-glow.glow-PLWC     { box-shadow: inset 0 0 40px rgba(16,185,129,0.1), inset 0 -20px 40px rgba(16,185,129,0.08); }
    .wrap-glow.glow-ROCKET   { box-shadow: inset 0 0 40px rgba(236,72,153,0.1), inset 0 -20px 40px rgba(236,72,153,0.08); }
    .wrap-glow.glow-NATIVE   { box-shadow: inset 0 0 40px rgba(236,72,153,0.1), inset 0 -20px 40px rgba(236,72,153,0.08); }
    .wrap-glow.glow-TOPVID   { box-shadow: inset 0 0 40px rgba(236,72,153,0.1), inset 0 -20px 40px rgba(236,72,153,0.08); }
    .wrap-glow.glow-EVENTS   { box-shadow: inset 0 0 40px rgba(245,158,11,0.1), inset 0 -20px 40px rgba(245,158,11,0.08); }
    .wrap-glow.glow-CUSTOM   { box-shadow: inset 0 0 40px rgba(100,100,100,0.1), inset 0 -20px 40px rgba(100,100,100,0.08); }
    .wrap-content { position: relative; z-index: 1; }

    .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1rem; }
    .header-eyebrow { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em; color: #525252; margin-bottom: 0.25rem; }
    .header-title { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; }
    .header-wip { font-size: 0.7rem; color: #404040; margin-top: 0.25rem; }
    .type-pill { font-size: 0.65rem; font-weight: 500; padding: 0.25rem 0.75rem; border-radius: 999px; border: 1px solid; white-space: nowrap; transition: all 0.3s; }

    .output-box { border-radius: 1rem; border: 1px solid #262626; padding: 1rem; background: rgba(23,23,23,0.5); margin-bottom: 1rem; transition: all 0.4s; }
    .output-box.active { background: rgba(20,20,20,0.7); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
    .output-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em; color: #525252; margin-bottom: 0.5rem; }
    .output-name { font-family: "SF Mono","Fira Code",monospace; font-size: 0.95rem; color: #fff; word-break: break-all; line-height: 1.5; transition: opacity 0.15s, transform 0.15s; }
    .output-name.animating { opacity: 0; transform: translateY(4px); }
    .output-box.active .output-name { text-shadow: 0 0 20px rgba(255,255,255,0.15); }
    .output-dash { font-family: monospace; color: #404040; font-size: 1rem; margin-bottom: 0.75rem; }
    .missing-pills { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .missing-pill { font-size: 0.65rem; padding: 0.2rem 0.6rem; border-radius: 999px; background: #1c1c1c; color: #525252; border: 1px solid #262626; }
    .copy-btn { margin-top: 0.5rem; width: 100%; padding: 0.5rem; border-radius: 0.75rem; font-size: 0.875rem; font-weight: 500; border: none; cursor: pointer; transition: all 0.2s; }
    .copy-btn.done { background: #262626; color: #737373; }

    .section { margin-bottom: 0.75rem; }
    .field-label { display: block; font-size: 0.65rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; color: #737373; margin-bottom: 0.5rem; }
    .field-label span { text-transform: none; letter-spacing: normal; color: #404040; font-weight: 400; }

    .btn-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
    .btn-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
    .btn-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
    .btn-grid-6 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0.35rem; }
    .btn-row { display: flex; gap: 0.5rem; }
    .btn-half { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .tog-btn { flex: 1; padding: 0.5rem 0.25rem; border-radius: 0.5rem; font-size: 0.8rem; font-weight: 500; border: 1px solid; background: transparent; cursor: pointer; transition: all 0.2s; color: inherit; }
    .tog-btn.sm { font-size: 0.7rem; }

    input[type=number], input[type=text] {
      width: 100%; background: #111; border: 1px solid #262626; color: #fff;
      border-radius: 0.5rem; padding: 0.6rem 0.75rem; font-size: 0.875rem;
      outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: #525252; }
    input::placeholder { color: #404040; }

    .hyphen-preview { font-size: 0.7rem; color: #525252; margin-top: 0.4rem; }
    .hyphen-preview span { color: #d4d4d4; font-family: monospace; }

    /* Subs toggle row */
    .subs-row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    .subs-langs { display: flex; gap: 0.4rem; flex-wrap: wrap; }

    /* History */
    .history-container { margin-top: 1rem; }
    .history-toggle { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; padding: 0.75rem 1rem; background: #111; border: 1px solid #262626; border-radius: 0.75rem; cursor: pointer; transition: all 0.2s; font-size: 0.65rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; color: #737373; width: 100%; }
    .history-toggle-label { display: flex; align-items: center; gap: 0.5rem; flex: 1; }
    .history-toggle-icon { display: inline-block; transition: transform 0.3s; font-size: 0.7rem; }
    .history-toggle.expanded .history-toggle-icon { transform: rotate(180deg); }
    .history-list { display: none; max-height: 0; overflow: hidden; opacity: 0; }
    .history-list.expanded { display: block; max-height: 90px; opacity: 1; margin-top: 0.5rem; overflow-y: auto; padding-right: 6px; }
    .history-list::-webkit-scrollbar { width: 6px; }
    .history-list::-webkit-scrollbar-track { background: transparent; }
    .history-list::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    .history-item { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; background: #111; border: 1px solid #1c1c1c; border-radius: 0.75rem; padding: 0.75rem 1rem; margin-bottom: 0.5rem; }
    .history-name { font-family: monospace; font-size: 0.7rem; color: #737373; word-break: break-all; line-height: 1.5; flex: 1; }
    .history-copy { flex-shrink: 0; font-size: 0.7rem; padding: 0.3rem 0.75rem; border-radius: 0.5rem; border: 1px solid #262626; background: transparent; color: #737373; cursor: pointer; transition: all 0.2s; }
    .history-copy:hover { border-color: #525252; color: #fff; }
    .history-copy.done { background: #1c1c1c; color: #525252; }
    .clear-history-btn { font-size: 0.65rem; padding: 0.3rem 0.6rem; border-radius: 0.5rem; border: 1px solid #262626; background: transparent; color: #737373; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }
    .clear-history-btn.warning { border-color: #ef4444; color: #fca5a5; }

    /* Color tokens */
    .c-SEO-active    { background: #3b82f6; color: #fff; border-color: #3b82f6; }
    .c-SEO-inactive  { border-color: rgba(59,130,246,0.3); color: #60a5fa; }
    .c-SEO-inactive:hover { border-color: #60a5fa; }
    .c-SEO-pill      { background: rgba(59,130,246,0.12); color: #60a5fa; border-color: rgba(59,130,246,0.3); }
    .c-SEO-border    { border-color: rgba(59,130,246,0.3) !important; }
    .c-SEO-glow      { box-shadow: 0 25px 50px -12px rgba(59,130,246,0.2); }

    .c-SS-active     { background: #8b5cf6; color: #fff; border-color: #8b5cf6; }
    .c-SS-inactive   { border-color: rgba(139,92,246,0.3); color: #a78bfa; }
    .c-SS-inactive:hover { border-color: #a78bfa; }
    .c-SS-pill       { background: rgba(139,92,246,0.12); color: #a78bfa; border-color: rgba(139,92,246,0.3); }
    .c-SS-border     { border-color: rgba(139,92,246,0.3) !important; }
    .c-SS-glow       { box-shadow: 0 25px 50px -12px rgba(139,92,246,0.2); }

    .c-PLWC-active   { background: #10b981; color: #fff; border-color: #10b981; }
    .c-PLWC-inactive { border-color: rgba(16,185,129,0.3); color: #34d399; }
    .c-PLWC-inactive:hover { border-color: #34d399; }
    .c-PLWC-pill     { background: rgba(16,185,129,0.12); color: #34d399; border-color: rgba(16,185,129,0.3); }
    .c-PLWC-border   { border-color: rgba(16,185,129,0.3) !important; }
    .c-PLWC-glow     { box-shadow: 0 25px 50px -12px rgba(16,185,129,0.2); }

    .c-ROCKET-active   { background: #ec4899; color: #fff; border-color: #ec4899; }
    .c-ROCKET-inactive { border-color: rgba(236,72,153,0.3); color: #f472b6; }
    .c-ROCKET-inactive:hover { border-color: #f472b6; }
    .c-ROCKET-pill     { background: rgba(236,72,153,0.12); color: #f472b6; border-color: rgba(236,72,153,0.3); }
    .c-ROCKET-border   { border-color: rgba(236,72,153,0.3) !important; }
    .c-ROCKET-glow     { box-shadow: 0 25px 50px -12px rgba(236,72,153,0.2); }

    .c-NATIVE-active   { background: #f43f8e; color: #fff; border-color: #f43f8e; }
    .c-NATIVE-inactive { border-color: rgba(244,63,142,0.3); color: #fb7eb5; }
    .c-NATIVE-inactive:hover { border-color: #fb7eb5; }
    .c-NATIVE-pill     { background: rgba(244,63,142,0.12); color: #fb7eb5; border-color: rgba(244,63,142,0.3); }
    .c-NATIVE-border   { border-color: rgba(244,63,142,0.3) !important; }
    .c-NATIVE-glow     { box-shadow: 0 25px 50px -12px rgba(244,63,142,0.2); }

    .c-TOPVID-active   { background: #db2777; color: #fff; border-color: #db2777; }
    .c-TOPVID-inactive { border-color: rgba(219,39,119,0.3); color: #f472b6; }
    .c-TOPVID-inactive:hover { border-color: #f472b6; }
    .c-TOPVID-pill     { background: rgba(219,39,119,0.12); color: #f472b6; border-color: rgba(219,39,119,0.3); }
    .c-TOPVID-border   { border-color: rgba(219,39,119,0.3) !important; }
    .c-TOPVID-glow     { box-shadow: 0 25px 50px -12px rgba(219,39,119,0.2); }

    .c-EVENTS-active   { background: #f59e0b; color: #fff; border-color: #f59e0b; }
    .c-EVENTS-inactive { border-color: rgba(245,158,11,0.3); color: #fbbf24; }
    .c-EVENTS-inactive:hover { border-color: #fbbf24; }
    .c-EVENTS-pill     { background: rgba(245,158,11,0.12); color: #fbbf24; border-color: rgba(245,158,11,0.3); }
    .c-EVENTS-border   { border-color: rgba(245,158,11,0.3) !important; }
    .c-EVENTS-glow     { box-shadow: 0 25px 50px -12px rgba(245,158,11,0.2); }

    .c-CUSTOM-active   { background: #6b7280; color: #fff; border-color: #6b7280; }
    .c-CUSTOM-inactive { border-color: rgba(107,114,128,0.3); color: #9ca3af; }
    .c-CUSTOM-inactive:hover { border-color: #9ca3af; }
    .c-CUSTOM-pill     { background: rgba(107,114,128,0.12); color: #9ca3af; border-color: rgba(107,114,128,0.3); }
    .c-CUSTOM-border   { border-color: rgba(107,114,128,0.3) !important; }
    .c-CUSTOM-glow     { box-shadow: 0 25px 50px -12px rgba(107,114,128,0.2); }

    .c-default-active   { background: #fff; color: #0a0a0a; border-color: #fff; }
    .c-default-inactive { border-color: #262626; color: #737373; }
    .c-default-inactive:hover { border-color: #525252; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useEffect, useRef } = React;

const TYPES = [
  { id: "SEO",    label: "SEO" },
  { id: "SS",     label: "SS" },
  { id: "PLWC",   label: "PLWC" },
  { id: "ROCKET", label: "The Rocket" },
  { id: "NATIVE", label: "Native" },
  { id: "TOPVID", label: "Top Videos" },
  { id: "EVENTS", label: "Events" },
  { id: "CUSTOM", label: "Custom" },
];

const SUBTYPES = {
  SEO: ["TOFU", "MOFU", "BOFU", "AI-ACT"],
  SS:  ["IGC", "CS", "INTV"],
};

const SUBTYPE_LABELS = {
  IGC: "IGC", CS: "Core Story", INTV: "Interview",
  TOFU: "TOFU", MOFU: "MOFU", BOFU: "BOFU", "AI-ACT": "AI ACT",
};

const MARKETS = ["ES", "PT", "FR", "DE", "IT", "EN", "ROW"];
const ASPECTS = ["16x9", "9x16", "1x1"];
const SS_FORMATS = ["LF", "MF", "SF", "PAID"];
const QUARTERS = ["Q1", "Q2", "Q3", "Q4"];
const YEARS = ["2025", "2026", "2027"];
const SUBS_LANGS = ["ES", "EN", "PT", "FR", "DE", "IT"];

const SHEET_URL = "https://script.google.com/macros/s/AKfycbzT4DuVNyXtXVVMDO8LO_WNHsxRG05-y35I9w4gzJNpueK69ryxMd8-fj6UqV0zO0LG/exec";

function pad(n) { return String(n).padStart(2, "0"); }
function hyphenate(s) { return s.trim().replace(/\s+/g, "-"); }

function useAnimated(value) {
  const [displayed, setDisplayed] = useState(value);
  const [anim, setAnim] = useState(false);
  const prev = useRef(value);
  useEffect(() => {
    if (value !== prev.current) {
      setAnim(true);
      const t = setTimeout(() => { setDisplayed(value); setAnim(false); prev.current = value; }, 150);
      return () => clearTimeout(t);
    }
  }, [value]);
  return { displayed, anim };
}

function App() {
  const [type, setType]           = useState("");
  const [subtype, setSubtype]     = useState("");
  const [market, setMarket]       = useState("");
  const [aspect, setAspect]       = useState("");
  const [ssFormat, setSsFormat]   = useState("");
  const [title, setTitle]         = useState("");
  const [year, setYear]           = useState("2026");
  const [quarter, setQuarter]     = useState("Q2");
  const [idNum, setIdNum]         = useState("1");
  const [subs, setSubs]           = useState(false);
  const [subsLang, setSubsLang]   = useState("");
  const [copied, setCopied]       = useState(false);
  const [version, setVersion]     = useState(1);
  const [clearConfirm, setClearConfirm] = useState(false);
  const [historyExpanded, setHistoryExpanded] = useState(false);
  const [history, setHistory]     = useState(() => {
    try { const s = localStorage.getItem("naming-history"); return s ? JSON.parse(s) : []; }
    catch (e) { return []; }
  });

  useEffect(() => {
    try { localStorage.setItem("naming-history", JSON.stringify(history)); } catch (e) {}
  }, [history]);

  const ck = type || null;
  const isSEO    = type === "SEO";
  const isSS     = type === "SS";
  const hasSubtype = isSEO || isSS;

  function handleType(t) {
    setType(t); setSubtype(""); setSsFormat("");
    setSubs(false); setSubsLang("");
  }

  function buildName() {
    if (!type || !market || !aspect) return null;

    const parts = [];

    if (isSEO) {
      // SEO_BOFU_2026-Q2-ID01_ES_16x9
      if (!subtype) return null;
      const id = `${year.slice(2)}-${quarter}-ID${pad(parseInt(idNum)||1)}`;
      parts.push("SEO");
      parts.push(subtype);
      if (title.trim()) parts.push(hyphenate(title));
      parts.push(id);
      parts.push(market);
      parts.push(aspect);
    } else if (isSS) {
      // SS_IGC_Title_LF_16x9_SUBS-ES
      if (!subtype || !ssFormat) return null;
      parts.push("SS");
      parts.push(subtype);
      if (title.trim()) parts.push(hyphenate(title));
      parts.push(ssFormat);
      parts.push(aspect);
      if (subs && subsLang) parts.push(`SUBS-${subsLang}`);
    } else {
      // TYPE_Market_Title_16x9
      const typeLabel = TYPES.find(t => t.id === type)?.label || type;
      parts.push(typeLabel === "The Rocket" ? "Rocket" : typeLabel === "Top Videos" ? "TopVid" : typeLabel);
      if (title.trim()) parts.push(hyphenate(title));
      parts.push(market);
      parts.push(aspect);
    }

    parts.push(`v${String(version).padStart(2,"0")}`);
    return parts.join("_");
  }

  const name = buildName();
  const { displayed, anim } = useAnimated(name);

  const missing = [];
  if (!type) missing.push("type");
  if (hasSubtype && !subtype) missing.push("subtype");
  if (isSS && !ssFormat) missing.push("format");
  if (!market) missing.push("market");
  if (!aspect) missing.push("aspect ratio");

  function syncToSheet(n) {
    const p = new URLSearchParams();
    p.append("name", n); p.append("type", type);
    p.append("market", market); p.append("aspect", aspect);
    fetch(SHEET_URL, { method: "POST", body: p }).catch(() => {});
  }

  function doCopy(n) {
    function fallback() {
      const node = document.createElement("span");
      node.textContent = n;
      node.style.cssText = "position:fixed;opacity:0";
      document.body.appendChild(node);
      const r = document.createRange();
      r.selectNode(node);
      const sel = window.getSelection();
      sel.removeAllRanges(); sel.addRange(r);
      try { document.execCommand("copy"); } catch (e) {}
      sel.removeAllRanges();
      document.body.removeChild(node);
    }
    if (navigator.clipboard?.writeText) {
      navigator.clipboard.writeText(n).catch(fallback);
    } else { fallback(); }
    setCopied(n);
    if (n === name) {
      syncToSheet(n);
      if (!history.includes(n)) setHistory(h => [n, ...h].slice(0, 10));
    }
    setTimeout(() => setCopied(false), 2000);
  }

  function clearHistoryConfirm() {
    if (clearConfirm) { setHistory([]); setClearConfirm(false); }
    else { setClearConfirm(true); setTimeout(() => setClearConfirm(false), 3000); }
  }

  function ac(val, cur) {
    return val === cur ? `c-${ck||"default"}-active` : `c-${ck||"default"}-inactive`;
  }

  function Btn({ value, current, onChange, label, ck: bck }) {
    const k = bck || ck || "default";
    const isActive = value === current;
    return React.createElement("button", {
      className: `tog-btn ${isActive ? `c-${k}-active` : `c-${k}-inactive`}`,
      onClick: () => onChange(current === value ? "" : value)
    }, label || value);
  }

  return React.createElement("div", { className: "wrap" },

    React.createElement("div", { className: `wrap-glow ${ck ? `glow-${ck}` : ""}` }),

    React.createElement("div", { className: "wrap-content" },

      // Header
      React.createElement("div", { className: "header" },
        React.createElement("div", null,
          React.createElement("p", { className: "header-eyebrow" }, "Factorial · Video & Motion"),
          React.createElement("h1", { className: "header-title" }, "Naming Generator"),
          React.createElement("p", { className: "header-wip" }, "Work in progress · versión de prueba")
        ),
        type && React.createElement("span", { className: `type-pill c-${ck}-pill` },
          TYPES.find(t => t.id === type)?.label || type
        )
      ),

      // Form
      React.createElement("div", null,

        // TYPE
        React.createElement("div", { className: "section" },
          React.createElement("label", { className: "field-label" }, "Type"),
          React.createElement("div", { className: "btn-grid-4" },
            ...TYPES.map(t =>
              React.createElement("button", {
                key: t.id,
                className: `tog-btn ${type === t.id ? `c-${t.id}-active` : `c-${t.id}-inactive`}`,
                onClick: () => handleType(type === t.id ? "" : t.id)
              }, t.label)
            )
          )
        ),

        // SUBTYPE
        hasSubtype && React.createElement("div", { className: "section" },
          React.createElement("label", { className: "field-label" },
            isSEO ? "Subtype" : "Story type"
          ),
          React.createElement("div", { className: `btn-grid-${(SUBTYPES[type]||[]).length <= 3 ? (SUBTYPES[type]||[]).length : 4}` },
            ...(SUBTYPES[type]||[]).map(st =>
              React.createElement(Btn, {
                key: st, value: st, current: subtype,
                onChange: setSubtype,
                label: SUBTYPE_LABELS[st] || st
              })
            )
          )
        ),

        // SS: Client + Format
        isSS && React.createElement(React.Fragment, null,

          React.createElement("div", { className: "section" },
            React.createElement("label", { className: "field-label" }, "Format"),
            React.createElement("div", { className: "btn-grid-4" },
              ...SS_FORMATS.map(f => React.createElement(Btn, { key: f, value: f, current: ssFormat, onChange: setSsFormat }))
            )
          ),
          React.createElement("div", { className: "section" },
            React.createElement("label", { className: "field-label" }, "Subtitles"),
            React.createElement("div", { className: "subs-row" },
              React.createElement("button", {
                className: `tog-btn ${subs ? `c-${ck}-active` : `c-${ck}-inactive`}`,
                style: { flex: "0 0 auto", padding: "0.5rem 1rem" },
                onClick: () => { setSubs(!subs); if (subs) setSubsLang(""); }
              }, subs ? "With subs" : "No subs"),
              subs && React.createElement("div", { className: "subs-langs" },
                ...SUBS_LANGS.map(l =>
                  React.createElement("button", {
                    key: l,
                    className: `tog-btn sm ${subsLang === l ? `c-${ck}-active` : `c-${ck}-inactive`}`,
                    style: { flex: "0 0 auto", padding: "0.4rem 0.75rem" },
                    onClick: () => setSubsLang(subsLang === l ? "" : l)
                  }, l)
                )
              )
            )
          )
        ),

        // SEO: Year + Quarter + ID
        isSEO && React.createElement("div", { className: "section btn-half" },
          React.createElement("div", null,
            React.createElement("label", { className: "field-label" }, "Year & Quarter"),
            React.createElement("div", { style: { display: "flex", gap: "0.5rem" } },
              ...YEARS.map(y => React.createElement("button", {
                key: y,
                className: `tog-btn sm ${year === y ? `c-${ck}-active` : `c-${ck}-inactive`}`,
                onClick: () => setYear(y)
              }, y.slice(2))),
              React.createElement("span", { style: { color: "#404040", alignSelf: "center", fontSize: "0.8rem" } }, "·"),
              ...QUARTERS.map(q => React.createElement("button", {
                key: q,
                className: `tog-btn sm ${quarter === q ? `c-${ck}-active` : `c-${ck}-inactive`}`,
                onClick: () => setQuarter(q)
              }, q))
            )
          ),
          React.createElement("div", null,
            React.createElement("label", { className: "field-label" }, "ID #"),
            React.createElement("input", {
              type: "number", min: "1", max: "999",
              value: idNum, placeholder: "1",
              onChange: e => setIdNum(e.target.value)
            })
          )
        ),

        // MARKET
        React.createElement("div", { className: "section" },
          React.createElement("label", { className: "field-label" }, "Market"),
          React.createElement("div", { className: "btn-grid-6" },
            ...MARKETS.map(m => React.createElement("button", {
              key: m,
              className: `tog-btn ${ac(m, market)}`,
              onClick: () => setMarket(market === m ? "" : m)
            }, m))
          )
        ),

        // TITLE
        React.createElement("div", { className: "section" },
          React.createElement("label", { className: "field-label" },
            "Title ", React.createElement("span", null, "(opcional)")
          ),
          React.createElement("input", {
            type: "text", value: title, placeholder: "title-here",
            onChange: e => setTitle(e.target.value)
          }),
          title.trim().includes(" ") && React.createElement("p", { className: "hyphen-preview" },
            "→ ", React.createElement("span", null, hyphenate(title))
          )
        ),

        // VERSION
        React.createElement("div", { className: "section" },
          React.createElement("label", { className: "field-label" }, "Version"),
          React.createElement("div", { style: { display: "flex", alignItems: "center", gap: "0.75rem" } },
            React.createElement("button", {
              className: `tog-btn ${version <= 1 ? "c-default-inactive" : `c-${ck||"default"}-inactive`}`,
              style: { flex: "0 0 auto", width: "2.5rem", fontSize: "1.1rem", padding: "0.35rem" },
              onClick: () => setVersion(v => Math.max(1, v - 1)),
              disabled: version <= 1
            }, "−"),
            React.createElement("span", {
              style: { fontFamily: "monospace", fontSize: "1rem", color: "#fff", minWidth: "2.5rem", textAlign: "center" }
            }, `v${String(version).padStart(2,"0")}`),
            React.createElement("button", {
              className: `tog-btn ${version >= 5 ? "c-default-inactive" : `c-${ck||"default"}-inactive`}`,
              style: { flex: "0 0 auto", width: "2.5rem", fontSize: "1.1rem", padding: "0.35rem" },
              onClick: () => setVersion(v => Math.min(5, v + 1)),
              disabled: version >= 5
            }, "+")
          )
        ),

        // ASPECT RATIO
        React.createElement("div", { className: "section" },
          React.createElement("label", { className: "field-label" }, "Aspect ratio"),
          React.createElement("div", { className: "btn-grid-3" },
            ...ASPECTS.map(a => React.createElement("button", {
              key: a,
              className: `tog-btn ${ac(a, aspect)}`,
              onClick: () => setAspect(aspect === a ? "" : a)
            }, a))
          )
        )
      ),

      // OUTPUT
      React.createElement("div", {
        className: `output-box ${name ? "active" : ""} ${name && ck ? `c-${ck}-border c-${ck}-glow` : ""}`
      },
        React.createElement("p", { className: "output-label" }, "Output"),
        name
          ? React.createElement(React.Fragment, null,
              React.createElement("p", { className: `output-name ${anim ? "animating" : ""}` }, displayed),
              React.createElement("button", {
                className: `copy-btn ${copied === name ? "done" : ""} ${ck ? `c-${ck}-active` : "c-default-active"}`,
                onClick: () => doCopy(name)
              }, copied === name ? "Copied ✓" : "Copy")
            )
          : React.createElement("div", null,
              React.createElement("p", { className: "output-dash" }, "––"),
              missing.length > 0 && React.createElement("div", { className: "missing-pills" },
                ...missing.map(f => React.createElement("span", { className: "missing-pill", key: f }, `Falta: ${f}`))
              )
            )
      ),

      // HISTORY
      history.length > 0 && React.createElement("div", { className: "history-container" },
        React.createElement("button", {
          className: `history-toggle ${historyExpanded ? "expanded" : ""}`,
          onClick: () => setHistoryExpanded(!historyExpanded)
        },
          React.createElement("div", { className: "history-toggle-label" },
            React.createElement("span", null, `History (${history.length})`),
            React.createElement("span", { className: "history-toggle-icon" }, "▼")
          ),
          React.createElement("button", {
            className: `clear-history-btn ${clearConfirm ? "warning" : ""}`,
            onClick: e => { e.stopPropagation(); clearHistoryConfirm(); }
          }, clearConfirm ? "Sure?" : "Clear")
        ),
        React.createElement("div", { className: `history-list ${historyExpanded ? "expanded" : ""}` },
          ...history.map((h, i) => React.createElement("div", { key: i, className: "history-item" },
            React.createElement("p", { className: "history-name" }, h),
            React.createElement("button", {
              className: `history-copy ${copied === h ? "done" : ""}`,
              onClick: () => doCopy(h)
            }, copied === h ? "✓" : "Copy")
          ))
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
